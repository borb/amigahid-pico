name: compile & stash

on:
  push:
    branches:
      - 'development'
      - 'devel/*'

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        board: [BOARD_HIDPICO_REV2, BOARD_HIDPICO_REV4]

    steps:
      - name: Additional dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-arm-none-eabi

      - name: Get the source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run cmake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBOARD_TYPE=${{matrix.board}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
